<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Redirecting...</title>
    <script>
      (function () {
        var basePath = "/dylan-banerjee-portfolio";
        var path = window.location.pathname;
        var route = path.indexOf(basePath + "/") === 0
          ? path.slice(basePath.length)
          : "/";
        var redirectPath = route + window.location.search + window.location.hash;

        window.location.replace(
          basePath + "/?redirect=" + encodeURIComponent(redirectPath)
        );
      })();
    </script>
  </head>
  <body>
    Redirecting...
  </body>
</html>
